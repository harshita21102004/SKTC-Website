<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>404 - Page Not Found | S.K. Trading Company</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <link rel="stylesheet" href="../css/404.css">

</head>

<body>

    <div class="error-container">

        <!-- Left -->

        <div class="error-left">

            <h1>404</h1>

            <h2>

                <i class="fa-solid fa-triangle-exclamation"></i> Oops! Page Not Found

            </h2>

            <p>

                Sorry, the page you are looking for doesn't exist, has been moved, or is temporarily unavailable.

            </p>

            <div class="buttons">

                <a href="../index.html" class="home-btn">

                    <i class="fa-solid fa-house"></i> Go Home

                </a>

                <a href="contact.html" class="contact-btn">

                    <i class="fa-solid fa-phone"></i> Contact Us

                </a>

            </div>

        </div>

        <!-- Right -->

        <div class="error-right">

            <img src="../assets/img/404.png" alt="404 Illustration">

        </div>

    </div>
    <!-- ================= Toast ================= -->

    <div id="toast" class="toast">

        Redirecting to Home...

    </div>

    <!-- ================= 404 JS ================= -->

    <script src="../js/404.js"></script>

</body>

</html>
